name: Debug macOS Install

on:
  workflow_dispatch:

jobs:
  debug:
    runs-on: macos-13
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: npm install (capture log)
        continue-on-error: true
        run: |
          npm install 2>&1 | tee install-log.txt
          echo "EXIT_CODE=$?" >> $GITHUB_ENV

      - name: Upload install log
        uses: actions/upload-artifact@v4
        with:
          name: install-log
          path: install-log.txt
          retention-days: 1