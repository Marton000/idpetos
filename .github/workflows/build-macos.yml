name: Build macOS Application

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.7)'
        required: true
        default: '1.0.7'
  push:
    branches:
      - main

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install

      - name: Check icon file
        run: |
          if [ -f "icon.icns" ]; then
            echo "✓ icon.icns found"
          else
            echo "⚠ Warning: icon.icns not found"
            echo "Will use default Electron icon"
          fi

      - name: Build macOS app
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List output files
        run: |
          echo "Build completed!"
          echo ""
          echo "Output files:"
          ls -lh dist/ 2>/dev/null || echo "No dist folder found"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build-${{ github.run_number }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/latest.yml
          retention-days: 30

      - name: Generate checksums
        run: |
          VERSION=${{ github.event.inputs.version || '1.0.7' }}
          if [ -f "dist/Idpetos-$VERSION.dmg" ]; then
            echo "DMG Checksum (SHA256):"
            shasum -a 256 "dist/Idpetos-$VERSION.dmg"
          fi
          if [ -f "dist/Idpetos-$VERSION.zip" ]; then
            echo ""
            echo "ZIP Checksum (SHA256):"
            shasum -a 256 "dist/Idpetos-$VERSION.zip"
          fi

      - name: Display build info
        run: |
          echo ""
          echo "========================================"
          echo "Build Summary"
          echo "========================================"
          echo "Version: ${{ github.event.inputs.version || '1.0.7' }}"
          echo "Build Number: ${{ github.run_number }}"
          echo "Build ID: ${{ github.run_id }}"
          echo "========================================"
          echo ""
          echo "Artifacts uploaded successfully!"
          echo "Download from the Artifacts section above."
