name: Build macOS Application

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number'
        required: true
        default: '1.0.7'
  push:
    branches:
      - main

jobs:
  build-macos:
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install dependencies (using official npm registry)
        run: npm install --registry=https://registry.npmjs.org

      - name: Build
        run: npm run build:mac --registry=https://registry.npmjs.org

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            dist/*.dmg
            dist/*.zip
            dist/latest.yml
          retention-days: 7
