name: Build macOS Application

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number'
        required: true
        default: '1.0.7'
  push:
    branches:
      - main
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'main.js'
      - 'index_new.html'
      - 'preload.js'
      - 'icon.ico'
      - 'scripts/**'
      - '.github/workflows/**'

jobs:
  build-macos:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Build macOS app
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List output files
        run: |
          echo "=== dist contents ==="
          ls -la dist/ 2>/dev/null || echo "dist/ not found"
          echo "=== dist subdirs ==="
          find dist/ -type f 2>/dev/null | head -20 || echo "no files found"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            dist/*.dmg
            dist/*.zip
            dist/latest.yml
          retention-days: 30
