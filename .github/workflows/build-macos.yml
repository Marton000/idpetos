name: Build macOS Application

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number'
        required: true
        default: '1.0.7'
  push:
    branches:
      - main
    paths:
      - 'package.json'
      - 'package-lock.json'
      - 'main.js'
      - 'index_new.html'
      - 'preload.js'
      - 'icon.ico'
      - 'scripts/**'
      - '.github/workflows/**'

jobs:
  build-macos:
    runs-on: macos-14

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Show Node/npm versions
        run: |
          node --version
          npm --version
          which node
          which npm

      - name: Show disk space
        run: df -h

      - name: Install dependencies
        run: npm install --verbose

      - name: Show installed binaries
        run: ls node_modules/.bin/ | head -20

      - name: Build macOS app
        run: npx electron-builder --mac --dir
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: List output
        run: |
          echo "=== dist ==="
          ls -la dist/ 2>/dev/null || echo "no dist"
          echo "=== dist/mac ==="
          ls -la dist/mac*/ 2>/dev/null || echo "no mac dir"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build
          path: |
            dist/
            package.json
          retention-days: 30
