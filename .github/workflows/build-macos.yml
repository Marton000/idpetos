name: Build macOS Application

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g., 1.0.7)'
        required: true
        default: '1.0.7'

jobs:
  build-macos:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: npm install
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

      - name: Check icon file
        run: |
          if [ -f "icon.icns" ]; then
            echo "icon.icns found"
          else
            echo "Warning: icon.icns not found, will use default Electron icon"
          fi

      - name: Build macOS app
        run: npm run build:mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

      - name: List output files
        run: |
          echo "Build completed!"
          echo "Output files:"
          ls -lh dist/ 2>/dev/null || echo "No dist folder found"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-build-${{ github.run_number }}
          path: |
            dist/*.dmg
            dist/*.zip
            dist/latest.yml
          retention-days: 30

      - name: Display build info
        run: |
          VERSION=${{ github.event.inputs.version || '1.0.7' }}
          echo ""
          echo "========================================"
          echo "Build Summary"
          echo "========================================"
          echo "Version: $VERSION"
          echo "Build Number: ${{ github.run_number }}"
          echo "========================================"
          echo "Artifacts uploaded successfully!"