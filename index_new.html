            // 智能匹配任务函数
            function findMatchingTimer(searchCriteria, tasks) {
                console.log('[findMatchingTimer] Search criteria:', searchCriteria, 'Tasks:', tasks);
                if (!tasks || tasks.length === 0) return -1;

                // 如果直接给了索引，就用索引
                if (searchCriteria.index !== undefined) {
                    var idx = parseInt(searchCriteria.index);
                    if (idx >= 0 && idx < tasks.length) return idx;
                }

                // 收集所有可能的搜索关键词
                var searchKeywords = [];
                if (searchCriteria.event) searchKeywords.push(searchCriteria.event);
                if (searchCriteria.task) searchKeywords.push(searchCriteria.task);
                if (searchCriteria.name) searchKeywords.push(searchCriteria.name);
                if (searchCriteria.description) searchKeywords.push(searchCriteria.description);

                console.log('[findMatchingTimer] Search keywords:', searchKeywords);

                // 通过事件描述匹配（模糊匹配）- 更智能的匹配
                for (var k = 0; k < searchKeywords.length; k++) {
                    var keyword = searchKeywords[k].toLowerCase().trim();
                    if (!keyword) continue;

                    for (var i = 0; i < tasks.length; i++) {
                        if (tasks[i].event) {
                            var taskEvent = tasks[i].event.toLowerCase().trim();
                            // 包含关系匹配
                            if (taskEvent.includes(keyword) || keyword.includes(taskEvent)) {
                                console.log('[findMatchingTimer] Matched by event:', i, tasks[i]);
                                return i;
                            }
                        }
                    }
                }

                // 通过时间匹配
                if (searchCriteria.time) {
                    for (var j = 0; j < tasks.length; j++) {
                        if (tasks[j].time === searchCriteria.time) {
                            console.log('[findMatchingTimer] Matched by time:', j, tasks[j]);
                            return j;
                        }
                    }
                }

                console.log('[findMatchingTimer] No match found');
                return -1;
            }

            // ========== 消息队列机制 ==========
            var messageQueue = [];
            var isShowingMessage = false;

            function showChatBubble(msg) {
                // 将消息加入队列
                messageQueue.push(msg);
                // 尝试处理队列
                processMessageQueue();
            }

            function showChatBubbleInstant(msg) {
                // 将消息加入队列
                messageQueue.push(msg);
                processMessageQueue();
            }

            function processMessageQueue() {
                // 如果正在显示消息，或队列为空，则返回
                if (isShowingMessage || messageQueue.length === 0) return;

                // 标记开始显示
                isShowingMessage = true;

                // 取出队列中的第一条消息
                var msg = messageQueue.shift();

                msg = String(msg).replace(/[\x00-\x08\x0B\x0C\x0E-\x1F\x7F]/g, '');
                msg = processAiCommands(msg);

                if (hideTimeout) {
                    clearTimeout(hideTimeout);
                    hideTimeout = null;
                }
                if (typingTimeout) {
                    clearTimeout(typingTimeout);
                    typingTimeout = null;
                }

                bubbleContent.textContent = '';
                chatBubble.classList.add('show');

                var i = 0;
                function type() {
                    if (i < msg.length) {
                        bubbleContent.textContent += msg.charAt(i);
                        i++;
                        typingTimeout = setTimeout(type, 35);
                    } else {
                        // 显示完成后，设置隐藏定时器
                        hideTimeout = setTimeout(function () {
                            chatBubble.classList.remove('show');
                            hideTimeout = null;
                            // 标记当前消息显示完成，处理下一条
                            isShowingMessage = false;
                            // 如果队列中还有消息，继续处理
                            if (messageQueue.length > 0) {
                                processMessageQueue();
                            }
                        }, 5000);
                    }
                }
                type();
            }

            document.getElementById('sendBtn').addEventListener('click', sendMsg);
            document.getElementById('messageInput').addEventListener('keypress', function (e) {
                if (e.key === 'Enter') sendMsg();
            });

            function sendMsg() {
                if (_isSending) return;
                _isSending = true;

                var input = document.getElementById('messageInput');
                var msg = input.value.trim();
                if (!msg) {
                    _isSending = false;
                    return;
                }
                input.value = '';

                // 更新用户最后主动聊天时间（用于空闲聊天判断）
                lastUserChatTime = Date.now();

                var t = translations[getCurrentLanguage()] || translations.zh;

                showChatBubble(t.replyThinking);
                var savedSettings = {};
                try { savedSettings = JSON.parse(localStorage.getItem('idmanos_pet_settings') || '{}'); } catch (e) { }

                // 检测用户是否在询问窗口/活动相关问题
                var windowQueryPatterns = [
                    /在干嘛|干什么|做什么|忙啥/i,
                    /在看什么|窗口|前台/i,
                    /在玩什么|在弄什么/i,
                    /what are you doing|what are you doing|doing now|window/i
                ];
                var needsWindowInfo = windowQueryPatterns.some(function (p) { return p.test(msg); });

                var botName = savedSettings.botName || 'Idpetos';
                var isEn = getCurrentLanguage() === 'en';

                // 如果需要窗口信息，先获取
                if (needsWindowInfo && electronAPI) {
                    electronAPI.getForegroundWindow().then(function (windowInfo) {
                        console.log('[SendMsg] Window info:', windowInfo);
                        if (windowInfo.title) {
                            var windowContext = isEn
                                ? ' The user is currently using: ' + windowInfo.title + '.'
                                : ' 用户当前正在使用的窗口是：' + windowInfo.title + '。';
                            processAndSendMessage(msg + windowContext, savedSettings, t);
                        } else {
                            processAndSendMessage(msg, savedSettings, t);
                        }
                    }).catch(function () {
                        processAndSendMessage(msg, savedSettings, t);
                    });
                } else {
                    processAndSendMessage(msg, savedSettings, t);
                }
            }

            function processAndSendMessage(msg, savedSettings, t) {
                try {
                    var chatCount = parseInt(localStorage.getItem('chatCount') || '0');
                    localStorage.setItem('chatCount', (chatCount + 1).toString());
                } catch (e) { }

                var lastChat = _lastChatTime || 0;
                var idleTime = Date.now() - lastChat;

                if (canTriggerMoodChange()) {
                    if (idleTime > 30 * 60 * 1000 && lastChat > 0) {
                        applyMoodChange('userReturn');
                    }
                    applyMoodChange('chat');
                }

                _lastChatTime = Date.now();

                var tone = analyzeMessageTone(msg);
                if (tone && canTriggerMoodChange()) {
                    if (tone.negative > 0) {
                        applyMoodChange('negativeWord');
                    }
                    if (tone.positive > 0) {
                        applyMoodChange('positiveWord');
                    }
                    if (tone.short) {
                        applyMoodChange('shortReply');
                    }
                }

                var apiEndpoint = savedSettings.apiEndpoint || savedSettings.platform || '';
                var apiToken = savedSettings.apiToken || '';
                var userName = savedSettings.userName || '';
                var userJob = savedSettings.userJob || '';
                var botName = savedSettings.botName || 'Idpetos';
                var botIdentity = savedSettings.botIdentity || '';
                var botIntro = savedSettings.botIntro || '';
                var userIntro = savedSettings.userIntro || '';
                var isEn = getCurrentLanguage() === 'en';
                var isCustomModelEnabled = document.getElementById('customModelToggle')?.classList.contains('active') || false;

                // 自定义模型模式：完全禁用光能，强制使用用户配置的API
                if (isCustomModelEnabled) {
                    if (!apiEndpoint || apiEndpoint === 'custom') {
                        setTimeout(function () {
                            showChatBubbleInstant(t.errorNoPlatform);
                        }, 200);
                        _isSending = false;
                        return;
                    }
                    if (!apiToken) {
                        setTimeout(function () {
                            showChatBubbleInstant(t.errorNoToken);
                        }, 200);
                        _isSending = false;
                        return;
                    }
                    try {
                        new URL(apiEndpoint);
                    } catch (e) {
                        setTimeout(function () {
                            showChatBubbleInstant(t.errorInvalidEndpoint);
                        }, 200);
                        _isSending = false;
                        return;
                    }
                }

                // 内置模式（自定义模型开关关闭时）
                var isBuiltInMode = !isCustomModelEnabled;

                if (isBuiltInMode) {
                    if (!canCallAI()) {
                        setTimeout(function () {

                            showChatBubbleInstant(fallbackMsg);

                }
                // 检查用户是否填写了人设信息
                // 只要有名字、身份、介绍、用户名任何一个，就发送自定义人设
                var hasUserConfig = (botName && botName.trim()) ||

                var systemPrompt = '';

                    systemPrompt = (isEn ? 'You are ' : '你是') + botName;

                    if (savedSettings.userZodiac && savedSettings.userZodiac.trim()) {
                        systemPrompt += (isEn ? ' Their zodiac sign is ' : '。他们的星座是') + savedSettings.userZodiac + (isEn ? '.' : '。');
                    }
                    if (savedSettings.userMBTI && savedSettings.userMBTI.trim()) {
                        systemPrompt += (isEn ? ' Their MBTI is ' : '。他们的MBTI是') + savedSettings.userMBTI + (isEn ? '.' : '。');
                    }
                    if (botIdentity && botIdentity.trim()) {
                        systemPrompt += (isEn ? ' Your role: ' : ' 你的角色：') + botIdentity + (isEn ? '.' : '。');
                    }
                    if (savedSettings.botZodiac && savedSettings.botZodiac.trim()) {
                        systemPrompt += (isEn ? ' Your zodiac sign is ' : '。你的星座是') + savedSettings.botZodiac + (isEn ? '.' : '。');
                    }
                    if (savedSettings.botMBTI && savedSettings.botMBTI.trim()) {
                        systemPrompt += (isEn ? ' Your MBTI is ' : '。你的MBTI是') + savedSettings.botMBTI + (isEn ? '.' : '。');
                    }
                    if (botIntro && botIntro.trim()) {
                        systemPrompt += (isEn ? ' About you:\n' : ' 关于你：\n') + botIntro + '\n';

                    if (userIntro && userIntro.trim()) {
                        systemPrompt += (isEn ? 'About the user:\n' : '关于用户：\n') + userIntro + '\n';

                    systemPrompt += (isEn ? 'Reply naturally like chatting with a friend. Use the same language as the user.\n' : '像朋友聊天一样自然回复。使用与用户相同的语言。\n');

                    // 引导用户填写未配置的部分
                    if (isEn) {
                        if (!userName || !userName.trim()) systemPrompt += 'Feel free to ask the user their name! ';
                        if (!botIdentity || !botIdentity.trim()) systemPrompt += 'You can ask the user about your identity! ';

                    } else {
                        if (!userName || !userName.trim()) systemPrompt += '可以问问用户叫什么名字哦！';
                        if (!botIdentity || !botIdentity.trim()) systemPrompt += '可以问问用户你是什么身份！';
                        if (!botIntro || !botIntro.trim()) systemPrompt += '可以问问用户关于你的一切！';

                }
                // 如果用户没有填写人设，systemPrompt 保持为空，让后端处理默认人设

                // 添加CMD指令说明（用于控制应用设置）- 自定义模式和内置模式都需要
                systemPrompt += '\n' + getAppKnowledge() + '\n';
                systemPrompt += '\n[当前心情] ' + getMoodInjectionText() + '\n';


                getSystemContextString(function (ctxStr) {

                    var messages = [];

                    // 只有在用户填写了人设时才发送 system 消息，否则让后端处理默认人设

                    if (savedSettings.chatMemory && chatHistory && chatHistory.length > 0) {

                        for (var hi = 0; hi < recentHistory.length; hi++) {
                            messages.push({ role: 'user', content: recentHistory[hi].user });
                            messages.push({ role: 'assistant', content: recentHistory[hi].bot });

                    messages.push({ role: 'user', content: msg });

                    var body = {
                        model: savedSettings.modelName || '',
                        messages: messages,
                        temperature: parseFloat(savedSettings.temperature) || 0.8
                    };
                    var fetchOptions = {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer ' + apiToken,
                            'X-Device-Id': getDeviceId(),
                            'Accept-Language': getCurrentLanguage() === 'en' ? 'en' : 'zh'  // ✅ 添加这一行
                        },
                        body: JSON.stringify(body)
                    };
                    if (apiEndpoint.includes('anthropic')) {
                        delete fetchOptions.headers['Content-Type'];
                        delete fetchOptions.headers['Authorization'];
                        body.max_tokens = parseInt(savedSettings.maxTokens) || 100;
                        fetchOptions.headers['x-api-key'] = apiToken;
                        fetchOptions.headers['anthropic-version'] = '2023-06-01';
                        fetchOptions.body = JSON.stringify(body);
                    }

                    function doChatFetch() {
                        fetchWithTimeout(apiEndpoint, fetchOptions, 120000)
                            .then(function (res) {
                                if (!res.ok) {
                                    return res.json().then(function (errData) {
                                        if (errData.lightExhausted || (errData.error && errData.error.includes('Light energy exhausted'))) {
                                            throw { lightExhausted: true };
                                        }
                                        throw new Error('HTTP ' + res.status + ': ' + res.statusText);
                                    }).catch(function (e) {
                                        if (e.lightExhausted) {
                                            throw e;
                                        }
                                        throw new Error('HTTP ' + res.status + ': ' + res.statusText);
                                    });
                                }
                                return res.json();
                            })
                            .then(function (data) {
                                var reply = '';
                                try {
                                    if (data.message) {
                                        reply = data.message;
                                    } else if (data.choices && data.choices[0] && data.choices[0].message) {
                                        reply = data.choices[0].message.content;
                                    } else if (data.candidates && data.candidates[0] && data.candidates[0].content) {
                                        reply = data.candidates[0].content.parts[0].text;
                                    } else if (data.content && data.content[0] && data.content[0].text) {
                                        reply = data.content[0].text;
                                    } else if (data.error && data.error.message) {
                                        reply = 'API错误: ' + data.error.message;
                                    } else if (typeof data === 'string') {
                                        reply = data;
                                    } else {
                                        reply = JSON.stringify(data);
                                    }
                                } catch (e) { reply = JSON.stringify(data); }

                                if (isBuiltInMode && data.lightRemaining !== undefined) {
                                    _cachedLightStatus = {
                                        remaining: data.lightRemaining,
                                        type: data.lightType || 'daily',
                                        total: data.lightType === 'redeemed' ? data.lightRemaining : 10,
                                        dailyLimit: 10
                                    };
                                    updateLightValueDisplay(data.lightRemaining, _cachedLightStatus.total);
                                    checkLightValueWarning();
                                }

                                try {
                                    if (reply && reply.trim()) {
                                        if (!isBuiltInMode) {
                                            reply = reply.trim().substring(0, parseInt(savedSettings.maxReplyChars) || 30);
                                        }
                                        if (savedSettings.chatMemory) {
                                            chatHistory.push({ user: msg, bot: reply });
                                            if (electronAPI && electronAPI.saveChatHistory) {
                                                electronAPI.saveChatHistory({ user: msg, bot: reply });
                                            }
                                        }
                                        // 用户主动发消息成功，更新最后互动时间
                                        lastUserChatTime = Date.now();
                                        showChatBubble(reply.replace(/\[CMD:[^\]]+\]/g, "").trim());
                                    } else {
                                        showChatBubbleInstant(t.errorEmpty);
                                    }
                                } catch (e) {
                                    console.error('[DEBUG] Error calling showChatBubble:', e);
                                }
                            })
                            .catch(function (err) {
                                console.error('[DEBUG] Fetch error:', err);
                                if (err.lightExhausted) {
                                    _cachedLightStatus = { remaining: 0, type: 'daily', dailyLimit: 10 };
                                    updateLightValueDisplay(0, 10);
                                    showChatBubbleInstant(isEn ? 'Light energy exhausted, try again tomorrow or redeem more!' : '光能值已用完，请明天再来或兑换更多！');
                                } else {
                                    var errorMsg = '';
                                    if (err.message && err.message.includes('Failed to fetch')) {
                                        errorMsg = t.errorNetwork;
                                    } else if (err.message && err.message.includes('timeout')) {
                                        errorMsg = t.errorTimeout;
                                    } else if (err.message && err.message.includes('401')) {
                                        errorMsg = t.errorAuth;
                                    } else if (err.message && err.message.includes('404')) {
                                        errorMsg = t.errorModel;
                                    } else if (err.message && (err.message.includes('500') || err.message.includes('502') || err.message.includes('503'))) {
                                        errorMsg = t.errorServer;
                                    } else {
                                        errorMsg = t.errorApi;
                                    }
                                    showChatBubbleInstant(errorMsg);
                                    if (typeof applyMoodChange === 'function' && typeof canTriggerMoodChange === 'function' && canTriggerMoodChange()) {
                                        applyMoodChange('apiError');
                                    }
                                }
                            })
                            .finally(function () {
                                _isSending = false;
                            });
                    }

                    if (isBuiltInMode) {
                        doChatFetch();
                    } else {
                        doChatFetch();
                    }
                });
            }

            var timerInterval = null;
            var timerRemaining = 0;
            var timerTaskName = '';
            var timerRunning = false;
            var timerSetMinutes = 25 * 60;
            var alarmAudioContext = null;
            var alarmOscillator = null;
            var alarmGainNode = null;
            var alarmInterval = null;
            var alarmActive = false;

            // 播放闹钟音效
            function playAlarmSound() {
                try {
                    alarmActive = true;
                    alarmAudioContext = new (window.AudioContext || window.webkitAudioContext)();

                    // 创建多个振荡器产生丰富的闹钟声音
                    function beep() {
                        if (!alarmActive) return;

                        // 主频率
                        var oscillator1 = alarmAudioContext.createOscillator();
                        oscillator1.type = 'sine';
                        oscillator1.frequency.setValueAtTime(880, alarmAudioContext.currentTime); // A5

                        var gainNode1 = alarmAudioContext.createGain();
                        gainNode1.gain.setValueAtTime(0, alarmAudioContext.currentTime);
                        gainNode1.gain.linearRampToValueAtTime(0.4, alarmAudioContext.currentTime + 0.05);
                        gainNode1.gain.exponentialRampToValueAtTime(0.01, alarmAudioContext.currentTime + 0.3);

                        oscillator1.connect(gainNode1);
                        gainNode1.connect(alarmAudioContext.destination);
                        oscillator1.start(alarmAudioContext.currentTime);
                        oscillator1.stop(alarmAudioContext.currentTime + 0.3);

                        // 辅助频率
                        var oscillator2 = alarmAudioContext.createOscillator();
                        oscillator2.type = 'sine';
                        oscillator2.frequency.setValueAtTime(1320, alarmAudioContext.currentTime); // E6

                        var gainNode2 = alarmAudioContext.createGain();
                        gainNode2.gain.setValueAtTime(0, alarmAudioContext.currentTime);
                        gainNode2.gain.linearRampToValueAtTime(0.2, alarmAudioContext.currentTime + 0.05);
                        gainNode2.gain.exponentialRampToValueAtTime(0.01, alarmAudioContext.currentTime + 0.3);

                        oscillator2.connect(gainNode2);
                        gainNode2.connect(alarmAudioContext.destination);
                        oscillator2.start(alarmAudioContext.currentTime);
                        oscillator2.stop(alarmAudioContext.currentTime + 0.3);
                    }

                    // 立即播放一次
                    beep();

                    // 每0.5秒播放一次
                    alarmInterval = setInterval(beep, 500);

                } catch (e) {
                    console.error('Failed to play alarm:', e);
                }
            }

            // 停止闹钟音效
            function stopAlarmSound() {
                alarmActive = false;
                if (alarmInterval) {
                    clearInterval(alarmInterval);
                    alarmInterval = null;
                }
                if (alarmOscillator) {
                    alarmOscillator.stop();
                    alarmOscillator = null;
                }
                if (alarmGainNode) {
                    alarmGainNode.disconnect();
                    alarmGainNode = null;
                }
                if (alarmAudioContext) {
                    alarmAudioContext.close();
                    alarmAudioContext = null;
                }
            }

            var timerBar = document.getElementById('timerBar');

            var timerStopBtn = document.getElementById('timerStopBtn');

            function formatTime(seconds) {
                var h = Math.floor(seconds / 3600);
                var m = Math.floor((seconds % 3600) / 60);
                var s = seconds % 60;
                if (h > 0) {
                    return h + ':' + (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
                }
                return (m < 10 ? '0' : '') + m + ':' + (s < 10 ? '0' : '') + s;
            }

                if (bubble.classList.contains('show')) {

                    var bubbleHeight = bubble.offsetHeight;

                    timerBar.style.bottom = (bubbleBottom + bubbleHeight + bubblePadding + 4) + 'px';

                var taskInput = document.getElementById('timerTaskInput').value.trim();

                var minutesInput = parseInt(document.getElementById('timerMinutesInput').value) || 0;
                var secondsInput = parseInt(document.getElementById('timerSecondsInput').value) || 0;

                hoursInput = Math.max(0, Math.min(48, hoursInput));
                minutesInput = Math.max(0, Math.min(59, minutesInput));
                secondsInput = Math.max(0, Math.min(59, secondsInput));

                timerTaskName = taskInput || '计时';
                timerSetMinutes = hoursInput * 3600 + minutesInput * 60 + secondsInput;
                timerRemaining = timerSetMinutes;

                if (timerRemaining <= 0) {
                    timerRemaining = 25 * 60;
                    timerSetMinutes = 25 * 60;
                }

                timerTaskDisplay.textContent = timerTaskName;
                timerDisplay.textContent = formatTime(timerRemaining);

                timerBar.classList.remove('complete');
                timerStartBtn.classList.remove('active');
                timerStopBtn.classList.remove('active');

            function startTimer() {

                    if (timerRemaining <= 0) {

                    if (apiEndpoint.includes('anthropic')) {
                        delete fetchOptions.headers['Content-Type'];
                        delete fetchOptions.headers['Authorization'];
                        body.max_tokens = parseInt(savedSettings.maxTokens) || 100;
                        fetchOptions.headers['x-api-key'] = apiToken;
                        fetchOptions.headers['anthropic-version'] = '2023-06-01';
                        fetchOptions.body = JSON.stringify(body);
                    }
                    fetchWithTimeout(apiEndpoint, fetchOptions, 120000)
                        .then(function (res) { return res.json(); })
                        .then(function (data) {
                            var reply = '';
                            try {
                                if (data.choices && data.choices[0] && data.choices[0].message) {
                                    reply = data.choices[0].message.content;
                                } else if (data.candidates && data.candidates[0] && data.candidates[0].content) {
                                    reply = data.candidates[0].content.parts[0].text;
                                } else if (data.content && data.content[0] && data.content[0].text) {
                                    reply = data.content[0].text;
                                }
                            } catch (e) { }
                            if (reply) {
                                if (!isBuiltInMode) {
                                    reply = reply.trim().substring(0, parseInt(savedSettings.maxReplyChars) || 30);
                                }
                                showChatBubble(reply);
                            } else {
                                showChatBubble(timerTaskName + '结束啦');
                            }
                        })
                        .catch(function () {
                            showChatBubble(timerTaskName + '结束啦');
                            if (typeof applyMoodChange === 'function' && typeof canTriggerMoodChange === 'function' && canTriggerMoodChange()) {
                                applyMoodChange('apiError');
                            }
                        });
                } else if (isBuiltInMode) {
                    // 内置AI模式
                    if (!canCallAI()) {
                        showChatBubble(timerTaskName + '结束啦');
                        return;
                    }

                    apiEndpoint = BUILT_IN_API_ENDPOINT;
                    apiToken = 'built-in';

                    var prompt = '';
                    var systemPrompt = '';

                    if (hasUserConfig) {
                        // 使用用户的自定义配置
                        systemPrompt = '你是' + botName;
                        if (userName && userName.trim()) systemPrompt += '。你朋友叫' + userName + '。';
                        if (botIdentity && botIdentity.trim()) systemPrompt += ' 你的角色：' + botIdentity + '。';
                        if (botIntro && botIntro.trim()) systemPrompt += ' 关于你：\n' + botIntro + '\n';
                        systemPrompt += '像朋友聊天一样自然回复。';

                        // 引导用户填写未配置的部分
                        if (!userName || !userName.trim()) systemPrompt += '可以问问用户叫什么名字哦！';
                        if (!botIdentity || !botIdentity.trim()) systemPrompt += '可以问问用户你是什么身份！';
                        if (!botIntro || !botIntro.trim()) systemPrompt += '可以问问用户关于你的一切！';
                    } else {
                        prompt = '用户设定的"' + timerTaskName + '"计时结束了。';
                        // systemPrompt 保持为空，让后端处理默认人设
                    }

                    var messages = [];
                    if (hasUserConfig && systemPrompt.trim()) {
                        messages.push({ role: 'system', content: systemPrompt });
                    }
                    messages.push({ role: 'user', content: prompt });

                    var body = {
                        model: '',
                        messages: messages,
                        temperature: 0.8
                    };
                    var fetchOptions = {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': 'Bearer built-in',
                            'X-Device-Id': getDeviceId()
                        },
                        body: JSON.stringify(body)
                    };

                    consumeLightValue().catch(function (err) {
                        console.error('[LightValue] Failed to consume:', err);
                    });

                    fetchWithTimeout(apiEndpoint, fetchOptions, 120000)
                        .then(function (res) { return res.json(); })
                        .then(function (data) {
                            var reply = '';
                            try {
                                if (data.message) {
                                    reply = data.message;
                                } else if (data.choices && data.choices[0] && data.choices[0].message) {
                                    reply = data.choices[0].message.content;
                                } else if (typeof data === 'string') {
                                    reply = data;
                                }
                            } catch (e) { }

                            if (reply) {
                                showChatBubble(reply);
                            } else {
                                showChatBubble(timerTaskName + '结束啦');
                            }

                            if (data.lightRemaining !== undefined) {
                                updateLightValueDisplay(data.lightRemaining, data.type === 'redeemed' ? (data.total || 10) : (data.dailyLimit || 10));
                            }
                        })
                        .catch(function () {
                            showChatBubble(timerTaskName + '结束啦');
                        });
                } else {
                    var completeMessages = [
                        timerTaskName + '结束啦',
                        timerTaskName + '时间到',
                        '好了，休息下吧'
                    ];
                    var ri = Math.floor(Math.random() * completeMessages.length);
                    showChatBubble(completeMessages[ri]);
                }
            }

            document.getElementById('timerSetBtn').addEventListener('click', showTimerBar);

            timerStartBtn.addEventListener('click', function () {
                timerBar.classList.remove('complete');
                stopAlarmSound();
                startTimer();
            });

            timerStopBtn.addEventListener('click', function () {
                timerBar.classList.remove('complete');
                stopAlarmSound();
                stopTimer(false);
            });

            timerCloseBtn.addEventListener('click', closeTimerBar);

            var bubbleObserver = new MutationObserver(function () {
                if (timerBar.classList.contains('show')) {
                    setTimeout(updateTimerPosition, 50);
                }
            });
            bubbleObserver.observe(document.getElementById('chatBubble'), {
                attributes: true,
                attributeFilter: ['class'],
                childList: true,
                subtree: true,
                characterData: true
            });

            loadSettings();
            applyTheme();
            initLightValue();

            console.log('[Init] Settings loaded, checkers should be running');
            console.log('[Init] Reminder interval ID:', reminderInterval);
            console.log('[Init] Water checker interval ID:', waterCheckerInterval);
            console.log('[Init] Active chat interval ID:', activeChatCheckerInterval);

            // 智能鼠标穿透功能
            var isMouseOverInteractive = false;
            var lastIgnoreState = true; // 初始默认穿透
            var throttleTimeout = null;

            // 检查元素是否是可交互的
            function isInteractiveElement(el) {
                if (!el) return false;
                var tagName = el.tagName.toLowerCase();
                if (tagName === 'button' || tagName === 'input' || tagName === 'textarea' ||
                    tagName === 'select' || tagName === 'a') {
                    return true;
                }
                // 检查特定的ID和class
                var id = el.id;
                if (id === 'petWindow' || id === 'avatarArea' || id === 'settingsBtn' || id === 'clockBtn' ||
                    id === 'randomColorBtn' || id === 'followBtn' || id === 'settingsPanel' ||
                    id === 'clockPanel' || id === 'countdownBar' || id === 'chatBubble' || id === 'moodBtn' || id === 'moodPanel' || id === 'closeMoodBtn') {
                    return true;
                }
                if (el.classList && (el.classList.contains('ctrl-btn') || el.classList.contains('btn') ||
                    el.classList.contains('input-field') || el.classList.contains('slider'))) {
                    return true;
                }
                // 检查父元素
                return el.parentElement ? isInteractiveElement(el.parentElement) : false;
            }

            // 节流更新穿透状态
            function updateIgnoreState(shouldIgnore) {
                if (lastIgnoreState === shouldIgnore) return;
                lastIgnoreState = shouldIgnore;
                if (electronAPI && electronAPI.setIgnoreMouseEvents) {
                    electronAPI.setIgnoreMouseEvents(shouldIgnore);
                }
            }

            // 使用节流的mousemove监听
            document.addEventListener('mousemove', function (e) {
                if (throttleTimeout) return;
                throttleTimeout = setTimeout(function () {
                    throttleTimeout = null;
                    var target = document.elementFromPoint(e.clientX, e.clientY);
                    var isInteractive = isInteractiveElement(target);
                    if (isInteractive !== isMouseOverInteractive) {
                        isMouseOverInteractive = isInteractive;
                        updateIgnoreState(!isInteractive);
                    }
                }, 50); // 50ms节流，平衡响应性和性能
            });

            // 初始状态：允许穿透
            if (electronAPI && electronAPI.setIgnoreMouseEvents) {
                electronAPI.setIgnoreMouseEvents(true);
            }

            if (electronAPI && electronAPI.onSystemThemeChanged) {
                electronAPI.onSystemThemeChanged(function (theme) {
                    if (settings.autoTheme) {
                        applyThemeClass(theme === 'dark');
                    }
                });
            }

            if (window.matchMedia) {
                window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function (e) {
                    if (settings.autoTheme) {
                        applyThemeClass(e.matches);
                    }
                });
            }

            if (electronAPI && electronAPI.getSystemContext) {
                electronAPI.getSystemContext().then(function (ctx) {
                    systemContext = ctx;
                    contextLastFetch = Date.now();
                }).catch(function () { });
            }

            // 页面加载完成后启动所有检查器
            setTimeout(function () {
                console.log('[INIT] Starting all checkers after page load');
                startReminderChecker();
                startWaterChecker();
                startActiveChatChecker();
                initMoodSystem();
            }, 1000);
        })();
    </script>

    <!-- 更新提示模态框 -->
    <div id="updateModal"
        style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:99999;justify-content:center;align-items:center;">
        <div
            style="background:#fff;border-radius:12px;padding:20px;max-width:280px;width:90%;text-align:center;font-family:'Open Sans',sans-serif;">
            <div style="font-size:16px;font-weight:600;color:#333;margin-bottom:12px;" id="updateModalTitle">检测到新版本
            </div>
            <div style="font-size:13px;color:#666;margin-bottom:16px;line-height:1.5;" id="updateModalContent">
                是否要下载并安装新版本？</div>
            <div id="updateProgressContainer" style="display:none;margin-bottom:16px;">
                <div style="height:8px;background:#eee;border-radius:4px;overflow:hidden;">
                    <div id="updateProgressBar"
                        style="height:100%;background:#000;border-radius:4px;width:0%;transition:width 0.3s;"></div>
                </div>
                <div style="font-size:11px;color:#999;margin-top:6px;" id="updateProgressText">0%</div>
            </div>
            <div style="display:flex;gap:10px;justify-content:center;" id="updateModalButtons">
                <button id="updateLaterBtn" onclick="closeUpdateModal()"
                    style="padding:8px 16px;border:1px solid #ddd;border-radius:6px;background:#fff;color:#666;font-size:13px;cursor:pointer;">稍后</button>
                <button id="updateNowBtn" onclick="handleUpdateNow()"
                    style="padding:8px 16px;border:none;border-radius:6px;background:#000;color:#fff;font-size:13px;cursor:pointer;">立即更新</button>
            </div>
            <div id="updateReadyMessage" style="display:none;">
                <div style="font-size:12px;color:#000;margin-bottom:8px;">正在重启安装…</div>
            </div>
        </div>
    </div>
</body>
